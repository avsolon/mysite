server {
        server_name asolontsov.ru www.asolontsov.ru;

        # API images_edit
        location /api/ {
                proxy_pass http://localhost:8000;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
        }

        # API pastebin service
        location /service/pastebit/ {
            proxy_pass http://localhost:8002/service/pastebit/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /create {
            proxy_pass http://localhost:8002/create;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /qr/ {
            proxy_pass http://localhost:8002/qr/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Contact API 
        location /service/contact/ {
            proxy_pass http://localhost:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # сайт
        location / {
                proxy_pass http://localhost:8081;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
        }


    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/asolontsov.ru/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/asolontsov.ru/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}
server {
    if ($host = www.asolontsov.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = asolontsov.ru) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


        server_name asolontsov.ru www.asolontsov.ru;
    listen 80;
    return 404; # managed by Certbot
}