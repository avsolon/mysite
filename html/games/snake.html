<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Змейка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 10px;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 20px;
            position: relative;
        }

        #game-board {
            border: 3px solid #333;
            background-color: #1a1a2e;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            height: auto;
            display: block;
        }

        .score-section {
            width: 100%;
            text-align: center;
            margin: 15px 0;
        }

        #score {
            font-size: 24px;
            font-weight: bold;
            color: #2c3e50;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: 50px;
            transition: all 0.2s ease;
            min-width: 90px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(0,0,0,0.15);
        }

        button:active {
            transform: translateY(0);
        }

        #start-btn {
            background: linear-gradient(to right, #4CAF50, #45a049);
            color: white;
        }

        #pause-btn {
            background: linear-gradient(to right, #FF9800, #F57C00);
            color: white;
        }

        #reset-btn {
            background: linear-gradient(to right, #f44336, #d32f2f);
            color: white;
        }

        .mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 8px;
            margin-top: 20px;
            width: 200px;
            height: 200px;
        }

        .mobile-btn {
            background: rgba(255, 255, 255, 0.8);
            border: 2px solid #333;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .mobile-btn:active {
            background: rgba(200, 200, 200, 0.8);
        }

        .up-btn { grid-column: 2; grid-row: 1; }
        .left-btn { grid-column: 1; grid-row: 2; }
        .right-btn { grid-column: 3; grid-row: 2; }
        .down-btn { grid-column: 2; grid-row: 3; }

        .center-btn {
            grid-column: 2;
            grid-row: 2;
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 600px) {
            .mobile-controls {
                display: grid;
            }

            .game-container {
                padding: 15px;
            }

            button {
                padding: 10px 16px;
                font-size: 14px;
                min-width: 80px;
            }

            #score {
                font-size: 20px;
            }
        }

        @media (max-width: 400px) {
            .mobile-controls {
                width: 160px;
                height: 160px;
            }

            .mobile-btn {
                font-size: 20px;
            }
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            z-index: 10;
            display: none;
        }

        .game-over-text {
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .final-score {
            color: #4CAF50;
            font-size: 24px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="game-board" width="400" height="400"></canvas>
        <div class="score-section">
            <div id="score">Счёт: 0</div>
        </div>
        <div class="controls">
            <button id="start-btn">Старт</button>
            <button id="pause-btn">Пауза</button>
            <button id="reset-btn">Сброс</button>
        </div>

        <div class="mobile-controls">
            <div class="mobile-btn up-btn">↑</div>
            <div class="mobile-btn left-btn">←</div>
            <div class="mobile-btn center-btn"></div>
            <div class="mobile-btn right-btn">→</div>
            <div class="mobile-btn down-btn">↓</div>
        </div>

        <div class="game-over-overlay" id="game-over-overlay">
            <div class="game-over-text">Игра окончена!</div>
            <div class="final-score" id="final-score">Счёт: 0</div>
            <button id="restart-btn">Новая игра</button>
        </div>
    </div>

    <script>
        // Игровые константы
        const BASE_GRID_SIZE = 20;
        const BASE_TILE_COUNT = 20;
        const BASE_CANVAS_SIZE = 400;
        const INITIAL_SPEED = 120;

        // Игровые переменные
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let gameInterval;
        let isPaused = false;
        let gameRunning = false;

        // Динамические переменные для адаптации
        let currentCanvasSize = BASE_CANVAS_SIZE;
        let currentGridSize = BASE_GRID_SIZE;
        let currentTileCount = BASE_TILE_COUNT;

        // DOM элементы
        const canvas = document.getElementById('game-board');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');
        const resetBtn = document.getElementById('reset-btn');
        const gameOverOverlay = document.getElementById('game-over-overlay');
        const finalScoreDisplay = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');

        // Мобильные кнопки
        const upBtn = document.querySelector('.up-btn');
        const downBtn = document.querySelector('.down-btn');
        const leftBtn = document.querySelector('.left-btn');
        const rightBtn = document.querySelector('.right-btn');

        // Адаптация размера холста под мобильные устройства
        function resizeCanvas() {
            const container = canvas.parentElement;
            const maxWidth = Math.min(container.clientWidth - 40, 400);

            // Вычисляем размер кратный GRID_SIZE
            const targetTileCount = BASE_TILE_COUNT;
            currentCanvasSize = Math.floor(maxWidth / targetTileCount) * targetTileCount;

            if (currentCanvasSize < 200) {
                currentCanvasSize = 200;
            }

            currentGridSize = currentCanvasSize / targetTileCount;
            currentTileCount = targetTileCount;

            canvas.width = currentCanvasSize;
            canvas.height = currentCanvasSize;

            if (gameRunning || snake.length > 0) {
                draw();
            }
        }

        // Инициализация игры
        function initGame() {
            snake = [
                {x: 5, y: 10},
                {x: 4, y: 10},
                {x: 3, y: 10}
            ];
            generateFood();
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            scoreDisplay.textContent = `Счёт: ${score}`;
            gameOverOverlay.style.display = 'none';
            draw();
        }

        // Генерация еды
        function generateFood() {
            let validPosition = false;
            while (!validPosition) {
                food = {
                    x: Math.floor(Math.random() * currentTileCount),
                    y: Math.floor(Math.random() * currentTileCount)
                };

                validPosition = true;
                for (let segment of snake) {
                    if (segment.x === food.x && segment.y === food.y) {
                        validPosition = false;
                        break;
                    }
                }
            }
        }

        // Отрисовка игры
        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Отрисовка сетки
            ctx.strokeStyle = '#2d2d44';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= currentTileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * currentGridSize, 0);
                ctx.lineTo(i * currentGridSize, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * currentGridSize);
                ctx.lineTo(canvas.width, i * currentGridSize);
                ctx.stroke();
            }

            // Отрисовка змейки
            for (let i = 0; i < snake.length; i++) {
                if (i === 0) {
                    ctx.fillStyle = '#4CAF50';
                } else {
                    const greenValue = Math.max(100, 200 - i * 3);
                    ctx.fillStyle = `rgb(76, ${greenValue}, 80)`;
                }
                ctx.fillRect(
                    snake[i].x * currentGridSize,
                    snake[i].y * currentGridSize,
                    currentGridSize - 1,
                    currentGridSize - 1
                );

                // Добавление глаз змейке
                if (i === 0) {
                    ctx.fillStyle = '#000';
                    const eyeSize = currentGridSize / 5;
                    let eyeX1, eyeY1, eyeX2, eyeY2;

                    switch(direction) {
                        case 'right':
                            eyeX1 = snake[i].x * currentGridSize + currentGridSize - eyeSize - 2;
                            eyeY1 = snake[i].y * currentGridSize + eyeSize + 2;
                            eyeX2 = snake[i].x * currentGridSize + currentGridSize - eyeSize - 2;
                            eyeY2 = snake[i].y * currentGridSize + currentGridSize - eyeSize - 2;
                            break;
                        case 'left':
                            eyeX1 = snake[i].x * currentGridSize + 2;
                            eyeY1 = snake[i].y * currentGridSize + eyeSize + 2;
                            eyeX2 = snake[i].x * currentGridSize + 2;
                            eyeY2 = snake[i].y * currentGridSize + currentGridSize - eyeSize - 2;
                            break;
                        case 'up':
                            eyeX1 = snake[i].x * currentGridSize + eyeSize + 2;
                            eyeY1 = snake[i].y * currentGridSize + 2;
                            eyeX2 = snake[i].x * currentGridSize + currentGridSize - eyeSize - 2;
                            eyeY2 = snake[i].y * currentGridSize + 2;
                            break;
                        case 'down':
                            eyeX1 = snake[i].x * currentGridSize + eyeSize + 2;
                            eyeY1 = snake[i].y * currentGridSize + currentGridSize - eyeSize - 2;
                            eyeX2 = snake[i].x * currentGridSize + currentGridSize - eyeSize - 2;
                            eyeY2 = snake[i].y * currentGridSize + currentGridSize - eyeSize - 2;
                            break;
                    }

                    ctx.fillRect(eyeX1, eyeY1, eyeSize, eyeSize);
                    ctx.fillRect(eyeX2, eyeY2, eyeSize, eyeSize);
                }
            }

            // Отрисовка еды
            ctx.fillStyle = '#FF5252';
            ctx.beginPath();
            ctx.arc(
                food.x * currentGridSize + currentGridSize/2,
                food.y * currentGridSize + currentGridSize/2,
                currentGridSize/2 - 1,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // Блики на еде
            ctx.fillStyle = '#FF8A80';
            ctx.beginPath();
            ctx.arc(
                food.x * currentGridSize + currentGridSize/3,
                food.y * currentGridSize + currentGridSize/3,
                currentGridSize/6,
                0,
                Math.PI * 2
            );
            ctx.fill();
        }

        // Обновление состояния игры
        function update() {
            if (isPaused || !gameRunning) return;

            direction = nextDirection;
            const head = {...snake[0]};

            switch (direction) {
                case 'up': head.y--; break;
                case 'down': head.y++; break;
                case 'left': head.x--; break;
                case 'right': head.x++; break;
            }

            // Проверка столкновения со стенами - ИСПОЛЬЗУЕМ currentTileCount
            if (head.x < 0 || head.x >= currentTileCount || head.y < 0 || head.y >= currentTileCount) {
                gameOver();
                return;
            }

            // Проверка столкновения с самим собой
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreDisplay.textContent = `Счёт: ${score}`;
                generateFood();
            } else {
                snake.pop();
            }

            draw();
        }

        // Конец игры
        function gameOver() {
            clearInterval(gameInterval);
            gameRunning = false;
            isPaused = false;
            finalScoreDisplay.textContent = `Счёт: ${score}`;
            gameOverOverlay.style.display = 'flex';
        }

        // Обработка нажатий клавиш
        function handleKeydown(e) {
            if (!gameRunning) return;

            switch (e.key) {
                case 'ArrowUp':
                    if (direction !== 'down') nextDirection = 'up';
                    break;
                case 'ArrowDown':
                    if (direction !== 'up') nextDirection = 'down';
                    break;
                case 'ArrowLeft':
                    if (direction !== 'right') nextDirection = 'left';
                    break;
                case 'ArrowRight':
                    if (direction !== 'left') nextDirection = 'right';
                    break;
            }
        }

        // Обработка мобильных кнопок
        function setupMobileControls() {
            upBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (gameRunning && direction !== 'down') nextDirection = 'up';
            });

            downBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (gameRunning && direction !== 'up') nextDirection = 'down';
            });

            leftBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (gameRunning && direction !== 'right') nextDirection = 'left';
            });

            rightBtn.addEventListener('touchstart', (e) => {
                e.preventDefault();
                if (gameRunning && direction !== 'left') nextDirection = 'right';
            });

            // Также добавляем click для совместимости
            upBtn.addEventListener('click', () => {
                if (gameRunning && direction !== 'down') nextDirection = 'up';
            });

            downBtn.addEventListener('click', () => {
                if (gameRunning && direction !== 'up') nextDirection = 'down';
            });

            leftBtn.addEventListener('click', () => {
                if (gameRunning && direction !== 'right') nextDirection = 'left';
            });

            rightBtn.addEventListener('click', () => {
                if (gameRunning && direction !== 'left') nextDirection = 'right';
            });
        }

        // Кнопки управления
        startBtn.addEventListener('click', () => {
            if (!gameRunning) {
                initGame();
                gameRunning = true;
                isPaused = false;
                gameInterval = setInterval(update, INITIAL_SPEED);
            } else if (isPaused) {
                isPaused = false;
            }
        });

        pauseBtn.addEventListener('click', () => {
            if (gameRunning) {
                isPaused = !isPaused;
            }
        });

        resetBtn.addEventListener('click', () => {
            clearInterval(gameInterval);
            initGame();
            gameRunning = false;
            isPaused = false;
        });

        restartBtn.addEventListener('click', () => {
            initGame();
            gameRunning = true;
            isPaused = false;
            gameInterval = setInterval(update, INITIAL_SPEED);
        });

        // Инициализация
        window.addEventListener('load', () => {
            resizeCanvas();
            initGame();
            setupMobileControls();
        });

        window.addEventListener('resize', () => {
            const wasRunning = gameRunning;
            if (wasRunning) {
                clearInterval(gameInterval);
            }
            resizeCanvas();
            if (wasRunning) {
                gameInterval = setInterval(update, INITIAL_SPEED);
            }
        });

        document.addEventListener('keydown', handleKeydown);

        // Предотвращение прокрутки при свайпах на мобильных устройствах
        document.addEventListener('touchmove', function(e) {
            if (e.target.classList.contains('mobile-btn')) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
