<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Пятнашки</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #fff;
    padding: 20px;
    overflow: hidden;
  }

  h1 {
    font-size: 2rem; margin-bottom: 10px;
    text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
    letter-spacing: 4px; text-transform: uppercase;
  }

  .stats { display: flex; gap: 30px; margin-bottom: 20px; font-size: 1.1rem; opacity: 0.9; }
  .stats span {
    background: rgba(255, 255, 255, 0.1); padding: 8px 20px;
    border-radius: 30px; backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.15);
  }
  .stats .value { font-weight: bold; color: #ffd700; }

  .board {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 12px;
    background: rgba(255, 255, 255, 0.08); border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.12); backdrop-filter: blur(10px);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    width: min(85vw, 420px); height: min(85vw, 420px); position: relative;
  }

  .tile {
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(1.4rem, 5vw, 2.2rem); font-weight: 700;
    border-radius: 10px; cursor: pointer; user-select: none;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.3s ease;
  }

  .tile.number {
    background: linear-gradient(145deg, #4a4e8a, #3d3f7a); color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.15);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.15);
  }
  .tile.number:hover {
    transform: scale(1.04); background: linear-gradient(145deg, #5a5e9a, #4d4f8a);
  }
  .tile.number:active { transform: scale(0.96); }

  .tile.number.movable {
    background: linear-gradient(145deg, #5b6abf, #4a59a8); border-color: rgba(255, 255, 255, 0.3);
    box-shadow: 0 4px 15px rgba(91, 106, 191, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
  }
  .tile.number.movable:hover { background: linear-gradient(145deg, #6b7acf, #5a69b8); }

  .tile.empty {
    background: rgba(0, 0, 0, 0.25); border: 1px dashed rgba(255, 255, 255, 0.08);
    cursor: default; box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
  }
  .tile.correct {
    background: linear-gradient(145deg, #2d8a4e, #257a42) !important;
    border-color: rgba(100, 255, 150, 0.3) !important;
    box-shadow: 0 4px 15px rgba(45, 138, 78, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.15) !important;
  }

  .btn {
    margin-top: 20px; padding: 14px 40px; font-size: 1.1rem; font-weight: 600;
    border: none; border-radius: 50px; cursor: pointer;
    background: linear-gradient(145deg, #ffd700, #f0c000); color: #1a1a2e;
    letter-spacing: 1px; transition: all 0.2s ease;
    box-shadow: 0 4px 20px rgba(255, 215, 0, 0.3); text-transform: uppercase;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 30px rgba(255, 215, 0, 0.5); }
  .btn:active { transform: translateY(0); }

  #winMessage {
    display: none; text-align: center; margin-top: 20px;
    animation: fadeIn 0.4s ease;
  }
  #winMessage h2 { color: #ffd700; margin-bottom: 8px; font-size: 1.8rem; }
  #winMessage p { font-size: 1.1rem; opacity: 0.9; margin-bottom: 15px; line-height: 1.5; }
  .timer-display { font-variant-numeric: tabular-nums; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 400px) {
    h1 { font-size: 1.5rem; }
    .stats { gap: 15px; font-size: 0.9rem; }
    .stats span { padding: 6px 14px; }
    .board { gap: 4px; padding: 8px; }
    .btn { padding: 12px 30px; font-size: 1rem; }
  }
</style>
</head>
<body>

<h1>🧩 Пятнашки</h1>

<div class="stats">
  <span>Ходы: <span class="value" id="moves">0</span></span>
  <span>Время: <span class="value timer-display" id="timer">00:00</span></span>
</div>

<div class="board" id="board"></div>

<div id="controls">
  <button class="btn" id="shuffleBtn" type="button">🔀 Новая игра</button>
  
  <div id="winMessage">
    <h2>🎉 Победа!</h2>
    <p id="winText"></p>
    <button class="btn" id="playAgainBtn" type="button">Играть снова</button>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const SIZE = 4;
  const TOTAL = SIZE * SIZE;
  
  let board = [];
  let moves = 0;
  let timerInterval = null;
  let seconds = 0;
  let gameStarted = false;
  let gameWon = false;

  const boardEl = document.getElementById('board');
  const movesEl = document.getElementById('moves');
  const timerEl = document.getElementById('timer');
  const shuffleBtn = document.getElementById('shuffleBtn');
  const winMessage = document.getElementById('winMessage');
  const winText = document.getElementById('winText');
  const playAgainBtn = document.getElementById('playAgainBtn');

  // Безопасное перемешивание
  function shuffle() {
    let arr, attempts = 0;
    do {
      arr = Array.from({ length: TOTAL }, (_, i) => i === TOTAL - 1 ? 0 : i + 1);
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      attempts++;
      // Защита от теоретического зацикливания (никогда не сработает при 50% решаемости)
      if (attempts > 200) break; 
    } while (!isSolvable(arr) || isSolved(arr));
    return arr;
  }

  function solvedBoard() {
    return Array.from({ length: TOTAL }, (_, i) => i === TOTAL - 1 ? 0 : i + 1);
  }

  function isSolved() {
    const sol = solvedBoard();
    return board.every((val, idx) => val === sol[idx]);
  }

  function countInversions(arr) {
    let inv = 0;
    const filtered = arr.filter(x => x !== 0);
    for (let i = 0; i < filtered.length; i++) {
      for (let j = i + 1; j < filtered.length; j++) {
        if (filtered[i] > filtered[j]) inv++;
      }
    }
    return inv;
  }

  function isSolvable(arr) {
    const inv = countInversions(arr);
    const emptyRow = Math.floor(arr.indexOf(0) / SIZE);
    const emptyRowFromBottom = SIZE - emptyRow;
    return (emptyRowFromBottom % 2 === 0) === (inv % 2 === 1);
  }

  function emptyIndex() { return board.indexOf(0); }

  function getNeighbors(idx) {
    const row = Math.floor(idx / SIZE);
    const col = idx % SIZE;
    const n = [];
    if (row > 0) n.push(idx - SIZE);
    if (row < SIZE - 1) n.push(idx + SIZE);
    if (col > 0) n.push(idx - 1);
    if (col < SIZE - 1) n.push(idx + 1);
    return n;
  }

  function render() {
    boardEl.innerHTML = '';
    const emptyIdx = emptyIndex();
    const neighbors = getNeighbors(emptyIdx);

    for (let i = 0; i < TOTAL; i++) {
      const tile = document.createElement('div');
      tile.classList.add('tile');
      if (board[i] === 0) {
        tile.classList.add('empty');
      } else {
        tile.classList.add('number');
        tile.textContent = board[i];
        if (board[i] === i + 1) tile.classList.add('correct');
        if (neighbors.includes(i)) tile.classList.add('movable');
        tile.addEventListener('click', () => handleMove(i));
      }
      boardEl.appendChild(tile);
    }
  }

  function handleMove(idx) {
    if (gameWon) return;
    const emptyIdx = emptyIndex();
    if (!getNeighbors(emptyIdx).includes(idx)) return;

    if (!gameStarted) { gameStarted = true; startTimer(); }

    [board[idx], board[emptyIdx]] = [board[emptyIdx], board[idx]];
    moves++;
    movesEl.textContent = moves;
    render();

    if (isSolved()) {
      gameWon = true;
      stopTimer();
      const m = Math.floor(seconds / 60);
      const s = seconds % 60;
      winText.innerHTML = `Ходов: <strong>${moves}</strong><br>Время: <strong>${m} мин ${s} сек</strong>`;
      winMessage.style.display = 'block';
    }
  }

  function startTimer() {
    if (timerInterval) return;
    timerInterval = setInterval(() => {
      seconds++;
      const m = String(Math.floor(seconds / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      timerEl.textContent = `${m}:${s}`;
    }, 1000);
  }

  function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  }

  // Мгновенный сброс без задержек
  function newGame() {
    stopTimer();
    moves = 0; seconds = 0;
    gameStarted = false; gameWon = false;
    movesEl.textContent = '0';
    timerEl.textContent = '00:00';
    winMessage.style.display = 'none';
    board = shuffle();
    render();
  }

  shuffleBtn.addEventListener('click', newGame);
  playAgainBtn.addEventListener('click', newGame);

  // Клавиатура
  document.addEventListener('keydown', (e) => {
    if (gameWon) return;
    const emptyIdx = emptyIndex();
    const row = Math.floor(emptyIdx / SIZE);
    const col = emptyIdx % SIZE;
    let target = -1;

    switch (e.key) {
      case 'ArrowUp':    if (row < SIZE - 1) target = emptyIdx + SIZE; break;
      case 'ArrowDown':  if (row > 0) target = emptyIdx - SIZE; break;
      case 'ArrowLeft':  if (col < SIZE - 1) target = emptyIdx + 1; break;
      case 'ArrowRight': if (col > 0) target = emptyIdx - 1; break;
    }
    if (target !== -1) { e.preventDefault(); handleMove(target); }
  });

  // Свайпы
  let tx = 0, ty = 0;
  boardEl.addEventListener('touchstart', e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; }, { passive: true });
  boardEl.addEventListener('touchend', e => {
    if (gameWon) return;
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    const absDx = Math.abs(dx), absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 25) return;

    const emptyIdx = emptyIndex();
    const row = Math.floor(emptyIdx / SIZE);
    const col = emptyIdx % SIZE;
    let target = -1;

    if (absDx > absDy) {
      if (dx > 0 && col > 0) target = emptyIdx - 1;
      else if (dx < 0 && col < SIZE - 1) target = emptyIdx + 1;
    } else {
      if (dy > 0 && row > 0) target = emptyIdx - SIZE;
      else if (dy < 0 && row < SIZE - 1) target = emptyIdx + SIZE;
    }
    if (target !== -1) handleMove(target);
  }, { passive: true });

  // Старт
  newGame();
});
</script>

</body>
</html>
