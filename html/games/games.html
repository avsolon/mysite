<html lang="ru">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мини игры</title>

    <link rel="stylesheet" href="../css/styles.css">

<body>

<div class="container">



    <nav class="page-nav">
        <a href="../index.html" class="back-btn">
            ← На главную
        </a>
    </nav>

    <div class="main-content">

        <div class="info-block animate-in">
            <h1 class="name-title">🎮 Мини лаунчер игр</h1>
            <p class="subtitle">Выбери игру и играй прямо в браузере</p>
        </div>

        <div class="games-grid">

            <div class="game-card" onclick="openGame('snake.html')">
                <div class="icon">🐍</div>
                <h3>Змейка</h3>
                <p>Классическая игра</p>
            </div>

            <div class="game-card" onclick="openGame('tetris.html')">
                <div class="icon">🧩</div>
                <h3>Тетрис</h3>
                <p>На все времена</p>
            </div>

            <div class="game-card" onclick="openGame('21.html')">
                <div class="icon">✌️👆</div>
                <h3>21 (Очко)</h3>
                <p>Собери двдцать одно</p>
            </div>

            <div class="game-card" onclick="openGame('k_n_b.html')">
                <div class="icon">🪨✂️📄</div>
                <h3>Камень-Ножницы-Бумага</h3>
                <p>Классика жанра</p>
            </div>

            <div class="game-card" onclick="openGame('association_helper.html')">
                <div class="icon">🧠</div>
                <h3>Ассоциации</h3>
                <p>Помощник (CodeNames)</p>
            </div>

        </div>

    

    <!-- МОДАЛКА -->
    <div id="gameModal" class="modal">
        <div class="modal-content">
            <button class="close" onclick="closeGame()">✖</button>
            <iframe id="gameFrame"></iframe>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2025 Solontsov Andrey</p>
    </footer>
