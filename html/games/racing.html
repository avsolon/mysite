<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Гоночки</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', Arial, sans-serif;
  overflow: hidden;
}

#gameWrapper {
  position: relative;
  width: 100%;
  max-width: 480px;
  height: 100vh;
  max-height: 800px;
  display: flex;
  flex-direction: column;
  background: #0f0f23;
  overflow: hidden;
}

#hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  background: linear-gradient(135deg, #16213e, #0f3460);
  color: #e0e0e0;
  font-size: 16px;
  font-weight: 600;
  z-index: 10;
  border-bottom: 2px solid #e94560;
  flex-shrink: 0;
}

#hud span {
  display: flex;
  align-items: center;
  gap: 6px;
}

#hud .score-val {
  color: #ffd700;
  font-size: 20px;
}

#hud .speed-val {
  color: #00e5ff;
  font-size: 18px;
}

#gameCanvas {
  flex: 1;
  display: block;
  width: 100%;
  touch-action: none;
}

#controls {
  display: flex;
  gap: 12px;
  padding: 12px 16px;
  padding-bottom: max(12px, env(safe-area-inset-bottom));
  background: linear-gradient(0deg, #16213e, #0f3460);
  border-top: 2px solid #e94560;
  flex-shrink: 0;
}

.ctrl-btn {
  flex: 1;
  height: 64px;
  border: 2px solid rgba(233, 69, 96, 0.5);
  border-radius: 14px;
  background: rgba(233, 69, 96, 0.15);
  color: #fff;
  font-size: 28px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.1s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}

.ctrl-btn:active, .ctrl-btn.pressed {
  background: rgba(233, 69, 96, 0.5);
  transform: scale(0.96);
  border-color: #e94560;
}

#overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(10, 10, 30, 0.92);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
  text-align: center;
}

#overlay.hidden {
  display: none;
}

#overlay h1 {
  color: #e94560;
  font-size: 36px;
  margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
}

#overlay h2 {
  color: #ffd700;
  font-size: 24px;
  margin-bottom: 6px;
}

#overlay p {
  color: #aaa;
  font-size: 15px;
  margin-bottom: 20px;
  line-height: 1.5;
}

#overlay .final-score {
  color: #00e5ff;
  font-size: 48px;
  font-weight: 900;
  margin: 10px 0;
  text-shadow: 0 0 30px rgba(0, 229, 255, 0.4);
}

#overlay button {
  padding: 14px 48px;
  font-size: 20px;
  font-weight: 700;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  background: linear-gradient(135deg, #e94560, #c62a47);
  color: #fff;
  box-shadow: 0 4px 25px rgba(233, 69, 96, 0.4);
  transition: transform 0.15s, box-shadow 0.15s;
  margin-top: 10px;
}

#overlay button:active {
  transform: scale(0.95);
  box-shadow: 0 2px 15px rgba(233, 69, 96, 0.3);
}

#highScoreText {
  color: #888;
  font-size: 14px;
  margin-top: 14px;
}

#keyHint {
  color: #666;
  font-size: 13px;
  margin-top: 16px;
}

@media (min-width: 768px) {
  #gameWrapper {
    border-radius: 16px;
    max-height: 750px;
    box-shadow: 0 0 60px rgba(233, 69, 96, 0.15);
    border: 1px solid rgba(233, 69, 96, 0.2);
  }
}
</style>
</head>
<body>

<div id="gameWrapper">
  <div id="hud">
    <span>🏆 <span class="score-val" id="scoreDisplay">0</span></span>
    <span>⚡ <span class="speed-val" id="speedDisplay">1</span></span>
  </div>

  <canvas id="gameCanvas"></canvas>

  <div id="controls">
    <button class="ctrl-btn" id="btnLeft">◀</button>
    <button class="ctrl-btn" id="btnRight">▶</button>
  </div>

  <div id="overlay">
    <h1>🏎️ Гонки</h1>
    <p>Уворачивайся от машин и препятствий!<br>Скорость растёт с набором очков.</p>
    <button id="actionBtn">Старт!</button>
    <div id="keyHint">← → или A/D для управления</div>
    <div id="highScoreText"></div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const speedDisplay = document.getElementById('speedDisplay');
  const actionBtn = document.getElementById('actionBtn');
  const btnLeft = document.getElementById('btnLeft');
  const btnRight = document.getElementById('btnRight');
  const keyHint = document.getElementById('keyHint');
  const highScoreText = document.getElementById('highScoreText');

  const LANE_COUNT = 4;
  const OBSTACLE_COLORS = ['#e94560', '#ff6b35', '#ffd700', '#00e5ff', '#a855f7', '#22c55e', '#f472b6', '#fb923c'];
  const OBSTACLE_TYPES = ['car', 'truck', 'barrier'];

  let W, H, laneWidth, carW, carH;
  let playerX, playerTargetX, playerY;
  let obstacles = [];
  let particles = [];
  let roadLines = [];
  let score = 0;
  let level = 1;
  let baseSpeed = 4;
  let speed = baseSpeed;
  let gameRunning = false;
  let gameOver = false;
  let highScore = parseInt(localStorage.getItem('raceHighScore') || '0');
  let lastTime = 0;
  let spawnTimer = 0;
  let moveLeft = false;
  let moveRight = false;
  let animFrame = null;

  function resize() {
    const wrapper = document.getElementById('gameWrapper');
    const controlsH = document.getElementById('controls').offsetHeight;
    const hudH = document.getElementById('hud').offsetHeight;
    const availH = wrapper.clientHeight - hudH - controlsH;
    const availW = wrapper.clientWidth;

    canvas.width = availW * window.devicePixelRatio;
    canvas.height = availH * window.devicePixelRatio;
    canvas.style.width = availW + 'px';
    canvas.style.height = availH + 'px';

    ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);

    W = availW;
    H = availH;
    laneWidth = W / LANE_COUNT;
    carW = W * 0.18;
    carH = carW * 1.6;
    playerY = H - carH - 30;
    if (playerX === undefined) {
      playerX = W / 2 - carW / 2;
      playerTargetX = playerX;
    }
  }

  function initRoadLines() {
    roadLines = [];
    for (let y = -40; y < H + 40; y += 50) {
      roadLines.push({ y });
    }
  }

  function drawRoad() {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#2d2d44');
    grad.addColorStop(1, '#1a1a2e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#e94560';
    ctx.fillRect(0, 0, 8, H);
    ctx.fillRect(W - 8, 0, 8, H);

    ctx.strokeStyle = 'rgba(255,255,255,0.25)';
    ctx.lineWidth = 2;
    ctx.setLineDash([20, 20]);
    for (let i = 1; i < LANE_COUNT; i++) {
      const x = i * laneWidth;
      ctx.beginPath();
      for (const line of roadLines) {
        ctx.moveTo(x, line.y);
        ctx.lineTo(x, line.y + 25);
      }
      ctx.stroke();
    }
    ctx.setLineDash([]);
  }

  function roundRect(c, x, y, w, h, r, r2, r3, r4) {
    if (typeof r === 'number') { r2 = r3 = r4 = r; }
    c.beginPath();
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y);
    c.quadraticCurveTo(x + w, y, x + w, y + r);
    c.lineTo(x + w, y + h - r);
    c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    c.lineTo(x + r, y + h);
    c.quadraticCurveTo(x, y + h, x, y + h - r);
    c.lineTo(x, y + r);
    c.quadraticCurveTo(x, y, x + r, y);
    c.closePath();
  }

  function lightenColor(hex, amt) {
    let r = Math.min(255, parseInt(hex.slice(1, 3), 16) + amt);
    let g = Math.min(255, parseInt(hex.slice(3, 5), 16) + amt);
    let b = Math.min(255, parseInt(hex.slice(5, 7), 16) + amt);
    return `rgb(${r},${g},${b})`;
  }

  function darkenColor(hex, amt) {
    let r = Math.max(0, parseInt(hex.slice(1, 3), 16) - amt);
    let g = Math.max(0, parseInt(hex.slice(3, 5), 16) - amt);
    let b = Math.max(0, parseInt(hex.slice(5, 7), 16) - amt);
    return `rgb(${r},${g},${b})`;
  }

  function drawCar(x, y, w, h, color, isPlayer) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    roundRect(ctx, x + 3, y + 3, w, h, 6);
    ctx.fill();

    const bodyGrad = ctx.createLinearGradient(x, y, x, y + h);
    bodyGrad.addColorStop(0, lightenColor(color, 30));
    bodyGrad.addColorStop(1, color);
    ctx.fillStyle = bodyGrad;
    roundRect(ctx, x, y, w, h, 6);
    ctx.fill();

    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    roundRect(ctx, x, y, w, h, 6);
    ctx.stroke();

    if (isPlayer) {
      ctx.fillStyle = 'rgba(150,220,255,0.6)';
      roundRect(ctx, x + w * 0.15, y + h * 0.1, w * 0.7, h * 0.25, 4);
      ctx.fill();
      ctx.fillStyle = 'rgba(150,220,255,0.3)';
      roundRect(ctx, x + w * 0.2, y + h * 0.7, w * 0.6, h * 0.15, 3);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = 8;
      roundRect(ctx, x + 3, y + 2, w * 0.2, 5, 2); ctx.fill();
      roundRect(ctx, x + w - 3 - w * 0.2, y + 2, w * 0.2, 5, 2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ff3333';
      roundRect(ctx, x + 3, y + h - 6, w * 0.18, 4, 2); ctx.fill();
      roundRect(ctx, x + w - 3 - w * 0.18, y + h - 6, w * 0.18, 4, 2); ctx.fill();
    } else {
      ctx.fillStyle = 'rgba(150,220,255,0.5)';
      roundRect(ctx, x + w * 0.15, y + h * 0.65, w * 0.7, h * 0.22, 4);
      ctx.fill();
      ctx.fillStyle = 'rgba(150,220,255,0.25)';
      roundRect(ctx, x + w * 0.2, y + h * 0.12, w * 0.6, h * 0.15, 3);
      ctx.fill();
      ctx.fillStyle = '#ff3333';
      ctx.shadowColor = '#ff3333';
      ctx.shadowBlur = 6;
      roundRect(ctx, x + 3, y + h - 5, w * 0.18, 4, 2); ctx.fill();
      roundRect(ctx, x + w - 3 - w * 0.18, y + h - 5, w * 0.18, 4, 2); ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffee88';
      roundRect(ctx, x + 4, y + 2, w * 0.15, 4, 2); ctx.fill();
      roundRect(ctx, x + w - 4 - w * 0.15, y + 2, w * 0.15, 4, 2); ctx.fill();
    }
  }

  function drawTruck(x, y, w, h, color) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    roundRect(ctx, x + 3, y + 3, w, h, 4);
    ctx.fill();
    ctx.fillStyle = darkenColor(color, 20);
    roundRect(ctx, x, y + h * 0.3, w, h * 0.7, 3);
    ctx.fill();
    const cabGrad = ctx.createLinearGradient(x, y, x, y + h * 0.35);
    cabGrad.addColorStop(0, lightenColor(color, 20));
    cabGrad.addColorStop(1, color);
    ctx.fillStyle = cabGrad;
    roundRect(ctx, x + 2, y, w - 4, h * 0.35, 4);
    ctx.fill();
    ctx.fillStyle = 'rgba(150,220,255,0.5)';
    roundRect(ctx, x + w * 0.12, y + h * 0.6, w * 0.76, h * 0.18, 3);
    ctx.fill();
    ctx.fillStyle = '#ff3333';
    ctx.shadowColor = '#ff3333';
    ctx.shadowBlur = 5;
    roundRect(ctx, x + 2, y + h - 5, w * 0.2, 4, 2); ctx.fill();
    roundRect(ctx, x + w - 2 - w * 0.2, y + h - 5, w * 0.2, 4, 2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  function drawBarrier(x, y, w, h) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    roundRect(ctx, x + 2, y + 2, w, h, 3);
    ctx.fill();
    const stripeH = 8;
    const stripes = Math.ceil(h / stripeH);
    for (let i = 0; i < stripes; i++) {
      ctx.fillStyle = i % 2 === 0 ? '#ff6b35' : '#222';
      const sy = y + i * stripeH;
      const sh = Math.min(stripeH, y + h - sy);
      roundRect(ctx, x, sy, w, sh, i === 0 ? 3 : 0, i === stripes - 1 ? 3 : 0);
      ctx.fill();
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.15)';
    ctx.lineWidth = 1;
    roundRect(ctx, x, y, w, h, 3);
    ctx.stroke();
  }

  function drawParticles() {
    for (const p of particles) {
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    const pad = 4;
    return ax + pad < bx + bw - pad && ax + aw - pad > bx + pad &&
           ay + pad < by + bh - pad && ay + ah - pad > by + pad;
  }

  function spawnObstacle() {
    const type = OBSTACLE_TYPES[Math.floor(Math.random() * OBSTACLE_TYPES.length)];
    const color = OBSTACLE_COLORS[Math.floor(Math.random() * OBSTACLE_COLORS.length)];
    let w, h;
    if (type === 'truck') {
      w = laneWidth * 0.6;
      h = w * 2.0;
    } else if (type === 'barrier') {
      w = laneWidth * (0.5 + Math.random() * 0.7);
      h = w * 0.35;
    } else {
      w = laneWidth * (0.42 + Math.random() * 0.15);
      h = w * 1.6;
    }

    const lane = Math.floor(Math.random() * LANE_COUNT);
    const x = lane * laneWidth + (laneWidth - w) / 2;
    const y = -h - 20;

    const tooClose = obstacles.some(o => o.y < h + 30 && Math.abs(o.x - x) < laneWidth);
    if (tooClose) {
      const altLane = (lane + 1 + Math.floor(Math.random() * (LANE_COUNT - 1))) % LANE_COUNT;
      const altX = altLane * laneWidth + (laneWidth - w) / 2;
      obstacles.push({ x: altX, y, w, h, color, type, passed: false });
    } else {
      obstacles.push({ x, y, w, h, color, type, passed: false });
    }
  }

  function spawnExplosion(x, y, w, h) {
    const cx = x + w / 2;
    const cy = y + h / 2;
    for (let i = 0; i < 20; i++) {
      particles.push({
        x: cx + (Math.random() - 0.5) * w,
        y: cy + (Math.random() - 0.5) * h,
        vx: (Math.random() - 0.5) * 6,
        vy: (Math.random() - 0.5) * 6,
        size: 2 + Math.random() * 4,
        alpha: 1,
        color: ['#e94560', '#ff6b35', '#ffd700', '#fff'][Math.floor(Math.random() * 4)]
      });
    }
  }

  function getSpawnIntervalSec() {
    // Возвращает интервал в секундах между появлением препятствий
    // Уровень 1: каждые 0.7с
    // Уровень 5: каждые 0.45с
    // Уровень 10: каждые 0.25с
    const base = 0.75;
    const min = 0.22;
    return Math.max(min, base - (level - 1) * 0.055);
  }

  function update(dt) {
    if (!gameRunning || gameOver) return;

    level = 1 + Math.floor(score / 50);
    speed = baseSpeed + (level - 1) * 0.9;
    speedDisplay.textContent = level;

    // Спавн препятствий (таймер в секундах)
    spawnTimer += dt;
    const spawnInterval = getSpawnIntervalSec();
    if (spawnTimer >= spawnInterval) {
      spawnTimer = 0;
      spawnObstacle();

      // Дополнительные препятствия на высоких уровнях
      if (level >= 3 && Math.random() < 0.4) {
        setTimeout(() => { if (gameRunning && !gameOver) spawnObstacle(); }, 80);
      }
      if (level >= 6 && Math.random() < 0.35) {
        setTimeout(() => { if (gameRunning && !gameOver) spawnObstacle(); }, 180);
      }
    }

    const moveSpeed = W * 0.014 * dt * 60;
    if (moveLeft) playerTargetX -= moveSpeed;
    if (moveRight) playerTargetX += moveSpeed;
    playerTargetX = Math.max(10, Math.min(W - carW - 10, playerTargetX));
    playerX += (playerTargetX - playerX) * 0.25;

    for (const line of roadLines) {
      line.y += speed * dt * 60;
      if (line.y > H + 40) line.y -= (H + 80);
    }

    for (let i = obstacles.length - 1; i >= 0; i--) {
      const o = obstacles[i];
      o.y += speed * dt * 60;

      if (!o.passed && o.y > playerY + carH) {
        o.passed = true;
        score += 10;
        scoreDisplay.textContent = score;
      }

      if (rectsOverlap(playerX, playerY, carW, carH, o.x, o.y, o.w, o.h)) {
        spawnExplosion(playerX, playerY, carW, carH);
        gameOver = true;
        gameRunning = false;
        if (score > highScore) {
          highScore = score;
          localStorage.setItem('raceHighScore', highScore.toString());
        }
        setTimeout(showGameOver, 500);
        return;
      }

      if (o.y > H + 100) {
        obstacles.splice(i, 1);
      }
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.alpha -= 0.02;
      p.size *= 0.97;
      if (p.alpha <= 0) particles.splice(i, 1);
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawRoad();

    for (const o of obstacles) {
      if (o.type === 'truck') drawTruck(o.x, o.y, o.w, o.h, o.color);
      else if (o.type === 'barrier') drawBarrier(o.x, o.y, o.w, o.h);
      else drawCar(o.x, o.y, o.w, o.h, o.color, false);
    }

    if (!gameOver) drawCar(playerX, playerY, carW, carH, '#00e5ff', true);

    drawParticles();

    const vignette = ctx.createRadialGradient(W / 2, H / 2, H * 0.3, W / 2, H / 2, H * 0.8);
    vignette.addColorStop(0, 'rgba(0,0,0,0)');
    vignette.addColorStop(1, 'rgba(0,0,0,0.35)');
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, W, H);
  }

  function gameLoop(timestamp) {
    if (!lastTime) lastTime = timestamp;
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;
    update(dt);
    draw();
    animFrame = requestAnimationFrame(gameLoop);
  }

  function showGameOver() {
    overlay.classList.remove('hidden');
    overlay.innerHTML = `
      <h1>💥 Авария!</h1>
      <h2>Ваш счёт</h2>
      <div class="final-score">${score}</div>
      <p>Уровень: ${level}</p>
      <button id="restartBtn">Ещё раз!</button>
      <div id="highScoreText">🏆 Рекорд: ${highScore}</div>
      <div id="keyHint">← → или A/D для управления</div>
    `;
    document.getElementById('restartBtn').addEventListener('click', startGame);
  }

  function showStartScreen() {
    overlay.classList.remove('hidden');
    overlay.innerHTML = `
      <h1>🏎️ Гонки</h1>
      <p>Уворачивайся от машин и препятствий!<br>Скорость растёт с набором очков.</p>
      <button id="startBtn">Старт!</button>
      <div id="keyHint">← → или A/D для управления</div>
      <div id="highScoreText">🏆 Рекорд: ${highScore}</div>
    `;
    document.getElementById('startBtn').addEventListener('click', startGame);
  }

  function startGame() {
    score = 0;
    level = 1;
    speed = baseSpeed;
    obstacles = [];
    particles = [];
    spawnTimer = 0;
    gameOver = false;
    gameRunning = true;
    lastTime = 0;
    playerX = W / 2 - carW / 2;
    playerTargetX = playerX;
    scoreDisplay.textContent = '0';
    speedDisplay.textContent = '1';
    overlay.classList.add('hidden');
    initRoadLines();
  }

  function addBtnEvents(btn, onDown, onUp) {
    btn.addEventListener('touchstart', e => { e.preventDefault(); onDown(); }, { passive: false });
    btn.addEventListener('touchend', e => { e.preventDefault(); onUp(); }, { passive: false });
    btn.addEventListener('touchcancel', () => onUp());
    btn.addEventListener('mousedown', e => { e.preventDefault(); onDown(); });
    btn.addEventListener('mouseup', e => { e.preventDefault(); onUp(); });
    btn.addEventListener('mouseleave', () => onUp());
  }

  addBtnEvents(btnLeft, () => { moveLeft = true; btnLeft.classList.add('pressed'); }, () => { moveLeft = false; btnLeft.classList.remove('pressed'); });
  addBtnEvents(btnRight, () => { moveRight = true; btnRight.classList.add('pressed'); }, () => { moveRight = false; btnRight.classList.remove('pressed'); });

  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A' || e.key === 'ф' || e.key === 'Ф') {
      moveLeft = true;
      btnLeft.classList.add('pressed');
    }
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D' || e.key === 'в' || e.key === 'В') {
      moveRight = true;
      btnRight.classList.add('pressed');
    }
    if ((e.key === ' ' || e.key === 'Enter') && !gameRunning) {
      startGame();
    }
  });

  document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A' || e.key === 'ф' || e.key === 'Ф') {
      moveLeft = false;
      btnLeft.classList.remove('pressed');
    }
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D' || e.key === 'в' || e.key === 'В') {
      moveRight = false;
      btnRight.classList.remove('pressed');
    }
  });

  let touchStartX = 0;
  canvas.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  canvas.addEventListener('touchmove', e => {
    const dx = e.touches[0].clientX - touchStartX;
    if (dx < -15) { moveLeft = true; moveRight = false; }
    else if (dx > 15) { moveRight = true; moveLeft = false; }
    else { moveLeft = false; moveRight = false; }
  }, { passive: true });
  canvas.addEventListener('touchend', () => { moveLeft = false; moveRight = false; });

  window.addEventListener('resize', resize);
  resize();
  initRoadLines();
  showStartScreen();
  animFrame = requestAnimationFrame(gameLoop);
})();
</script>
</body>
</html>
