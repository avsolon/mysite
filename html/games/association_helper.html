<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Помощник по игре Ассоциации</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 20px;
            max-width: 100%;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
            font-size: 1.8rem;
            line-height: 1.2;
        }

        .input-section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
            font-size: 1rem;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            font-size: 1rem;
            transition: border-color 0.3s;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            letter-spacing: normal;
            line-height: 1.4;
        }

        textarea:focus {
            outline: none;
            border-color: #3498db;
        }

        .words-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            margin: 15px 0;
        }

        .word-button {
            background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            letter-spacing: normal;
            line-height: 1.2;
        }

        .black-word-button {
            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
        }

        .word-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .word-button.selected {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            transform: scale(0.98);
        }

        .selected-words-container {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }

        .selected-words-title {
            font-weight: 600;
            color: #34495e;
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .selected-words-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            min-height: 40px;
        }

        .selected-word {
            background: linear-gradient(135deg, #3498db 0%, #2980b9 100%);
            color: white;
            padding: 6px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.85rem;
        }

        .remove-btn {
            background: rgba(255,255,255,0.3);
            border: none;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            cursor: pointer;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .association-input {
            margin-top: 15px;
        }

        .result-display {
            background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            justify-content: flex-start;
        }

        button {
            padding: 12px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .btn-primary {
            background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%);
            color: white;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #95a5a6 0%, #7f8c8d 100%);
            color: white;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 0.9rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            body {
                padding: 5px;
            }
            
            .container {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.5rem;
                margin-bottom: 15px;
            }
            
            .words-grid {
                grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
                gap: 6px;
            }
            
            .word-button {
                padding: 8px 4px;
                font-size: 0.8rem;
            }
            
            .selected-words-list {
                gap: 6px;
            }
            
            .selected-word {
                padding: 5px 8px;
                font-size: 0.8rem;
            }
            
            .result-display {
                font-size: 1.1rem;
                padding: 12px;
            }
            
            .btn-group {
                justify-content: flex-start;
            }
            
            button {
                padding: 10px 15px;
                font-size: 0.95rem;
            }
            
            .btn-small {
                padding: 6px 10px;
                font-size: 0.85rem;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }
            
            h1 {
                font-size: 1.3rem;
            }
            
            .words-grid {
                grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
                gap: 5px;
            }
            
            .word-button {
                padding: 7px 3px;
                font-size: 0.75rem;
            }
            
            .selected-word {
                padding: 4px 7px;
                font-size: 0.75rem;
            }
            
            .result-display {
                font-size: 1rem;
            }
            
            textarea {
                font-size: 0.9rem;
                padding: 8px;
            }
            
            .btn-group {
                margin-top: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> Помощник по игре Ассоциации</h1>

        <div class="input-section">

            <label for="black-word">⚫ Черное слово:</label>
            <textarea id="black-word" rows="1"></textarea>
        </div>

        <div class="input-section">
            <label for="green-words">🟢 Зелёные слова:</label>
            <textarea id="green-words" rows="3"></textarea>
            <button class="btn-primary" onclick="generateWords()">Сгенерировать слова</button>
        </div>

        <div id="words-container" class="words-grid"></div>

        <div class="selected-words-container">
            <div class="selected-words-title">✅ Выбранные слова (<span id="selected-count">0</span>):</div>
            <div id="selected-words" class="selected-words-list"></div>
            <button class="btn-secondary" onclick="clearSelected()" style="margin-top: 10px;">🗑️ Очистить выбранные</button>
        </div>

        <div class="input-section association-input">
            <label for="association">💭 Ваша ассоциация:</label>
            <textarea id="association" rows="1" oninput="updateResult()"></textarea>
        </div>

        <div id="result-display" class="result-display">
            <span id="result-text">-</span>
        </div>

        <div class="btn-group">
            <button class="btn-primary btn-small" onclick="clearAll()">🔄 Сбросить всё</button>
        </div>
    </div>

    <script>
        let selectedWords = new Set();

        function generateWords() {
            const blackWord = document.getElementById('black-word').value.trim();
            const greenWords = document.getElementById('green-words').value.trim();
            
            if (!greenWords) {
                alert('Пожалуйста, введите зелёные слова!');
                return;
            }

            const greenWordArray = greenWords.split(/\s+/).filter(word => word.length > 0);
            const container = document.getElementById('words-container');
            
            container.innerHTML = '';
            
            // Добавляем черное слово первым
            if (blackWord) {
                const blackButton = document.createElement('button');
                blackButton.className = 'word-button black-word-button';
                blackButton.textContent = blackWord;
                container.appendChild(blackButton);
            }
            
            // Добавляем зелёные слова
            greenWordArray.forEach(word => {
                const button = document.createElement('button');
                button.className = 'word-button';
                button.textContent = word;
                button.onclick = () => toggleWord(word);
                container.appendChild(button);
            });
            
            updateSelectedCount();
            updateResult();
        }

        function toggleWord(word) {
            const button = event.target;
            
            if (selectedWords.has(word)) {
                selectedWords.delete(word);
                button.classList.remove('selected');
            } else {
                selectedWords.add(word);
                button.classList.add('selected');
            }
            
            updateSelectedCount();
            updateSelectedWordsDisplay();
            updateResult();
        }

        function updateSelectedCount() {
            document.getElementById('selected-count').textContent = selectedWords.size;
        }

        function updateSelectedWordsDisplay() {
            const container = document.getElementById('selected-words');
            container.innerHTML = '';
            
            selectedWords.forEach(word => {
                const span = document.createElement('span');
                span.className = 'selected-word';
                span.innerHTML = `
                    ${word}
                    <button class="remove-btn" onclick="removeSelectedWord('${word}')">×</button>
                `;
                container.appendChild(span);
            });
        }

        function removeSelectedWord(word) {
            selectedWords.delete(word);
            
            // Обновляем классы кнопок
            const buttons = document.querySelectorAll('.word-button');
            buttons.forEach(btn => {
                if (btn.textContent === word) {
                    btn.classList.remove('selected');
                }
            });
            
            updateSelectedCount();
            updateSelectedWordsDisplay();
            updateResult();
        }

        function clearSelected() {
            selectedWords.clear();
            
            // Снимаем выделение со всех кнопок
            const buttons = document.querySelectorAll('.word-button');
            buttons.forEach(btn => btn.classList.remove('selected'));
            
            updateSelectedCount();
            updateSelectedWordsDisplay();
            updateResult();
        }

        function clearAll() {
            document.getElementById('black-word').value = '';
            document.getElementById('green-words').value = '';
            document.getElementById('association').value = '';
            document.getElementById('words-container').innerHTML = '';
            selectedWords.clear();
            updateSelectedCount();
            updateSelectedWordsDisplay();
            updateResult();
        }

        function updateResult() {
            const association = document.getElementById('association').value.trim();
            const count = selectedWords.size;
            
            if (association && count > 0) {
                document.getElementById('result-text').textContent = `${association} ${count}`;
            } else {
                document.getElementById('result-text').textContent = '-';
            }
        }

        // Добавляем горячие клавиши
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                generateWords();
            }
        });
    </script>
</body>
</html>
