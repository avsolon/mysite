<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Proxy Service</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 50px;
        }

        button {
            padding: 15px 25px;
            background: #6366f1;
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        ul {
            margin-top: 30px;
            list-style: none;
            padding: 0;
        }

        li {
            margin: 10px 0;
            background: #1e293b;
            padding: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<h1>📡 Proxy Checker</h1>

<button onclick="loadProxies()">Получить прокси</button>

<ul id="list"></ul>

<script>
async function loadProxies() {
    const res = await fetch("http://proxy:8000/proxies");
    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.proxies.forEach((p, i) => {
        const li = document.createElement("li");
        li.textContent = `${i + 1}. ${p}`;
        list.appendChild(li);
    });
}
</script>

</body>
</html>
