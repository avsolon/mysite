<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои сервисы</title>

    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/games.css">
</head>
<body>

<div class="container">



    <nav class="page-nav">
        <a href="../index.html" class="back-btn">
            ← На главную
        </a>
    </nav>

    <div class="main-content">

        <div class="info-block animate-in">
            <h1 class="name-title">🎮 Полезные сервисы </h1>
            <p class="subtitle">Пользуйся</p>
        </div>

        <div class="games-grid">

            <div class="game-card" onclick="openGame('image_edit.html')">
                <div class="icon">🎨</div>
                <h3>Image Edit</h3>
                <p>Для обработки изображений</p>
            </div>

            <div class="game-card" onclick="openGame('pastebin.html')">
                <div class="icon">📨</div>
                <h3>Pastebin</h3>
                <p>Сервис мгновенных сообщений</p>
            </div>

        </div>
    

    <!-- МОДАЛКА -->
    <div id="gameModal" class="modal">
        <div class="modal-content">
            <button class="close" onclick="closeGame()">✖</button>
            <iframe id="gameFrame"></iframe>
        </div>
    </div>
</div>

<div id="footer"></div>
<script src="../js/footer.js"></script>
<script src="../js/games.js"></script>

</body>
</html>
